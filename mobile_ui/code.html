<!-- Micro-interaction Scripts -->
<script>
        const menuToggle = document.getElementById('menu-toggle');
        const menuClose = document.getElementById('menu-close');
        const sideNav = document.getElementById('side-nav');
        const overlay = document.getElementById('sidebar-overlay');

        function openMenu() {
            sideNav.style.left = '0';
            overlay.style.opacity = '1';
            overlay.style.pointerEvents = 'auto';
        }

        function closeMenu() {
            sideNav.style.left = '-320px';
            overlay.style.opacity = '0';
            overlay.style.pointerEvents = 'none';
        }

        menuToggle.addEventListener('click', openMenu);
        menuClose.addEventListener('click', closeMenu);
        overlay.addEventListener('click', closeMenu);

        // Simple input interaction
        const input = document.querySelector('input');
        const chatContainer = input.parentElement;

        input.addEventListener('focus', () => {
            chatContainer.style.borderColor = '#f2ca50';
            chatContainer.style.boxShadow = '0 0 20px rgba(242, 202, 80, 0.2)';
        });

        input.addEventListener('blur', () => {
            chatContainer.style.borderColor = 'rgba(212, 175, 55, 0.3)';
            chatContainer.style.boxShadow = '0 4px 30px rgba(0,0,0,0.5)';
        });
    </script>
